<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Internship Prep — Moses</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080B0F;
    --surface: #0D1117;
    --border: #1A2030;
    --muted: #607080;
    --text: #C8D8E8;
    --dim: #405060;
  }

  body {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #2A3A4A; border-radius: 2px; }

  /* ── Header ── */
  #header {
    border-bottom: 1px solid var(--border);
    padding: 20px 28px 16px;
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  #header-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: .15em; color: #fff; }
  #header-sub { font-size: 10px; color: var(--dim); letter-spacing: .08em; margin-top: 2px; }
  #progress-bar-wrap { flex: 1; min-width: 160px; max-width: 260px; }
  #progress-label { font-size: 10px; color: var(--dim); letter-spacing: .1em; margin-bottom: 5px; }
  #progress-bar-bg { height: 4px; background: #1A2030; border-radius: 2px; overflow: hidden; }
  #progress-bar-fill { height: 100%; background: #00D4FF; border-radius: 2px; transition: width .4s; }
  #progress-pct { font-size: 10px; color: #00D4FF; margin-top: 4px; }
  #user-bar { display:flex; align-items:center; gap:14px; }
  #user-name { font-size:11px; color:#405060; letter-spacing:.08em; }
  #user-name span { color:#7A9AB0; }
  #sync-status { font-size:10px; letter-spacing:.08em; min-width:80px; }
  #setup-again { font-size:10px; color:#304050; cursor:pointer; text-decoration:underline; border:none; background:none; font-family:"IBM Plex Mono",monospace; }

  /* ── Layout ── */
  #layout { display: flex; flex: 1; }

  /* ── Sidebar ── */
  #sidebar {
    width: 196px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: sticky; top: 65px;
    height: calc(100vh - 65px);
    overflow-y: auto;
  }

  .nav-btn {
    display: block; width: 100%;
    background: transparent; border: none;
    border-left: 3px solid transparent;
    padding: 10px 14px;
    text-align: left; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: all .15s;
  }
  .nav-btn:hover { border-left-color: #2A3A4A; }
  .nav-btn.active { border-left-color: var(--phase-color, #00D4FF); background: rgba(0,0,0,.3); }
  .nav-label { font-size: 9px; letter-spacing: .15em; color: var(--dim); margin-bottom: 2px; }
  .nav-title { font-size: 12px; color: var(--text); font-weight: 700; }
  .nav-dur { font-size: 9px; color: var(--dim); margin-top: 2px; }
  .nav-btn.active .nav-title { color: var(--phase-color, #00D4FF); }
  .nav-btn.active .nav-label { color: var(--phase-color, #00D4FF); }
  .nav-divider { border-top: 1px solid var(--border); margin: 10px 0; }

  /* ── Main ── */
  #main { flex: 1; padding: 28px 32px; overflow-y: auto; max-width: 900px; }

  /* ── Phase header ── */
  .phase-num { font-family: 'Bebas Neue', sans-serif; font-size: 80px; opacity: .05; position: absolute; right: 0; top: -10px; letter-spacing: .05em; pointer-events: none; }
  .phase-header { position: relative; margin-bottom: 20px; }
  .phase-eyebrow { font-size: 10px; letter-spacing: .2em; font-weight: 700; margin-bottom: 6px; }
  .phase-title { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: .1em; color: #fff; margin-bottom: 10px; }
  .phase-goal { font-size: 12px; color: #8AA0B0; line-height: 1.75; max-width: 680px; }

  /* ── Warning box ── */
  .warn {
    border-left: 3px solid #FF4444;
    background: #120808;
    padding: 11px 14px;
    border-radius: 0 2px 2px 0;
    margin-bottom: 18px;
    font-size: 11px; color: #FF9090; line-height: 1.65;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 12px;
  }
  .card-head {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    transition: border-color .15s;
    user-select: none;
  }
  .card-head:hover { border-bottom-color: var(--border); }
  .card-body { padding: 0 16px 14px; display: none; }
  .card-body.open { display: block; }
  .card-toggle { margin-left: auto; color: var(--dim); font-size: 16px; flex-shrink: 0; }

  /* ── Check items ── */
  .check-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid #0E1318;
    cursor: pointer; transition: opacity .15s;
  }
  .check-row:last-child { border-bottom: none; }
  .check-row:hover { opacity: .85; }
  .checkbox {
    width: 14px; height: 14px;
    border: 1px solid #2A3A4A;
    border-radius: 1px; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; transition: all .15s; color: #000;
  }
  .check-label { font-size: 12px; color: var(--text); line-height: 1.55; flex: 1; }
  .check-row.done .check-label { color: #2A3A4A; text-decoration: line-through; }

  /* ── Notes panel ── */
  .notes-panel {
    background: #070A0D;
    border-top: 1px solid #0E1318;
    padding: 12px 16px;
    font-size: 11px; color: #4A8A60;
    line-height: 1.75;
    display: none;
  }
  .notes-panel.open { display: block; }
  .notes-panel pre {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: #5A9A70;
    line-height: 1.75; white-space: pre-wrap;
    margin-top: 6px;
  }

  /* ── Tags ── */
  .tag {
    display: inline-block; font-size: 9px; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 1px;
  }

  /* ── Section headers ── */
  .section-head {
    font-size: 10px; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase;
    margin: 20px 0 8px; color: var(--dim);
  }

  /* ── Approach box ── */
  .approach {
    border-left: 3px solid var(--phase-color, #00D4FF);
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--phase-color, #00D4FF);
    padding: 12px 16px;
    border-radius: 0 2px 2px 0;
    font-size: 12px; color: #8090A0; line-height: 1.7;
    margin-bottom: 18px;
  }

  /* ── Lang tabs ── */
  .lang-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .lang-tab {
    padding: 8px 22px;
    background: transparent;
    border: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; font-weight: 700; letter-spacing: .1em;
    cursor: pointer; border-radius: 2px; transition: all .15s;
    color: var(--muted);
  }
  .lang-tab.active { color: #000; }

  /* ── Schedule grid ── */
  .sched-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .sched-card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 12px; }
  .sched-day { font-size: 10px; font-weight: 700; color: #7A8FA0; letter-spacing: .12em; margin-bottom: 8px; }
  .sched-slot { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 5px 0; border-bottom: 1px solid #0E1318; }
  .sched-slot:last-child { border-bottom: none; }

  /* ── Truth list ── */
  .truth-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .truth-num { color: #00D4FF; font-size: 12px; flex-shrink: 0; }
  .truth-text { font-size: 12px; color: #8090A0; line-height: 1.75; }

  /* ── GitHub banner ── */
  #gh-banner {
    background: #0D1A14; border: 1px solid #1A3A28;
    padding: 14px 18px; border-radius: 2px; margin-bottom: 20px;
    font-size: 11px; color: #4A9A70; line-height: 1.75;
  }
  #gh-banner strong { color: #6ADA90; }
  #gh-banner code { background: #0A150F; padding: 1px 6px; border-radius: 2px; font-size: 10px; color: #5ABA80; }

  /* ── Two-column ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } #sidebar { display: none; } #main { padding: 16px; } }
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="header-title">MICROSOFT INTERNSHIP PREP</div>
    <div id="header-sub">16-WEEK INTENSIVE · TARGET: Microsoft Kenya · Applications: November</div>
  </div>
  <div id="progress-bar-wrap">
    <div id="progress-label">OVERALL PROGRESS</div>
    <div id="progress-bar-bg"><div id="progress-bar-fill" style="width:0%"></div></div>
    <div id="progress-pct">0 / 0 items completed</div>
  </div>
  <div id="user-bar">
    <div id="user-name">user: <span id="user-name-val">—</span></div>
    <div id="sync-status"></div>
    <button id="setup-again" onclick="showSetupModal(() => renderApp())">change account</button>
  </div>
</div>

<div id="layout">
  <nav id="sidebar"></nav>
  <main id="main"></main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════
const PHASES = [
  // ── PHASE 0: LANGUAGE FOUNDATIONS ──────────────────────
  {
    id: 0, label: "PHASE 01", title: "Language Foundations",
    duration: "Weeks 1–3", color: "#FF6B35",
    goal: "Learn Python and C# from scratch — syntax, data structures, and how to write code properly. You cannot do DSA without a language. These 3 weeks are your launchpad.",
    warning: "Do not skip or rush this phase thinking 'I'll pick it up as I go'. If your language is shaky, you will freeze in interviews. Build a solid base here, everything else depends on it.",
    approach: "Pick Python as your primary language — it's faster to write in interviews and almost universally accepted. Learn C# in parallel but less intensively. By end of Week 3 you should be able to write any basic program in Python without googling syntax.",
    tabs: ["Python", "C#"],
    content: {
      Python: [
        {
          section: "Week 1 — Absolute Basics",
          items: [
            {
              label: "Variables, types, print()",
              note: "Python is dynamically typed — no need to declare types.\n\nx = 10          # int\nname = 'Moses'  # string\nprice = 3.14    # float\nis_ok = True    # bool\nprint(x, name)  # prints: 10 Moses\n\nTo check the type: print(type(x))  →  <class 'int'>"
            },
            {
              label: "if / elif / else — conditional logic",
              note: "Python uses indentation (4 spaces) instead of curly braces.\n\nx = 15\nif x > 20:\n    print('big')\nelif x > 10:\n    print('medium')   # this prints\nelse:\n    print('small')\n\nImportant: no parentheses needed around the condition."
            },
            {
              label: "for loops and while loops",
              note: "# for loop over a range\nfor i in range(5):      # 0, 1, 2, 3, 4\n    print(i)\n\n# for loop over a list\nfruits = ['apple', 'mango', 'banana']\nfor fruit in fruits:\n    print(fruit)\n\n# while loop\nn = 0\nwhile n < 5:\n    print(n)\n    n += 1\n\nrange(start, stop, step): range(2, 10, 2) → 2,4,6,8"
            },
            {
              label: "Functions — def, parameters, return",
              note: "def add(a, b):\n    return a + b\n\nresult = add(3, 4)   # result = 7\nprint(result)\n\n# Default parameters\ndef greet(name='stranger'):\n    return f'Hello, {name}!'\n\nprint(greet('Moses'))   # Hello, Moses!\nprint(greet())          # Hello, stranger!\n\nf-strings (f'...') let you embed variables directly in strings."
            },
            {
              label: "Strings — indexing, slicing, methods",
              note: "s = 'hello'\nprint(s[0])       # 'h'  — indexing starts at 0\nprint(s[-1])      # 'o'  — negative = from end\nprint(s[1:4])     # 'ell' — slice [start:end] exclusive\nprint(s[:3])      # 'hel'\nprint(len(s))     # 5\n\n# Useful methods\nprint(s.upper())       # 'HELLO'\nprint(s.replace('l','r'))  # 'herro'\nprint('ell' in s)      # True\nprint(s.split('l'))    # ['he', '', 'o']\n\nStrings are immutable — you cannot do s[0] = 'H'."
            },
            {
              label: "Lists — the most important structure in Python",
              note: "arr = [3, 1, 4, 1, 5]\narr.append(9)      # add to end:  [3,1,4,1,5,9]\narr.pop()          # remove last: [3,1,4,1,5]\narr.pop(0)         # remove first: [1,4,1,5]\narr.insert(0, 99)  # insert at index 0\nprint(arr[2])      # access by index: 1\nprint(len(arr))    # length\n\n# Sorting\narr.sort()              # sorts in place\nsorted_copy = sorted(arr)  # returns new sorted list\n\n# 2D list (grid)\ngrid = [[0,1],[2,3]]\nprint(grid[1][0])   # 2\n\nDSA note: lists are your arrays. Also your stack (append+pop)."
            },
          ]
        },
        {
          section: "Week 1 — Intermediate Syntax",
          items: [
            {
              label: "Dictionaries (dict) — key-value storage",
              note: "d = {}                    # empty dict\nd['name'] = 'Moses'       # set\nd['age'] = 21\nprint(d['name'])          # get: 'Moses'\nprint('age' in d)         # True — check key exists\nprint(d.get('score', 0))  # safe get, returns 0 if missing\n\n# Loop over dict\nfor key, val in d.items():\n    print(key, '->', val)\n\n# Common DSA use: frequency count\nfreq = {}\nfor ch in 'hello':\n    freq[ch] = freq.get(ch, 0) + 1\n# freq = {'h':1, 'e':1, 'l':2, 'o':1}"
            },
            {
              label: "Sets — unique, unordered, O(1) lookup",
              note: "s = set()\ns.add(3)\ns.add(5)\ns.add(3)      # duplicate ignored\nprint(s)      # {3, 5}\nprint(3 in s) # True  — O(1), much faster than 'in list'\ns.discard(3)  # remove (no error if missing)\n\n# Create from list (removes duplicates)\nunique = set([1,2,2,3,3])\nprint(unique)  # {1, 2, 3}\n\nDSA note: use sets as 'visited' in graph traversal."
            },
            {
              label: "Tuples — immutable pairs/triples",
              note: "t = (3, 5)          # create\nx, y = t            # unpack\nprint(x, y)         # 3 5\n\n# Swap two variables without a temp!\na, b = 5, 10\na, b = b, a         # a=10, b=5\n\n# Return multiple values from a function\ndef min_max(arr):\n    return min(arr), max(arr)\n\nlo, hi = min_max([3,1,5])\n\nDSA note: tuples in heaps — (cost, node) for Dijkstra."
            },
            {
              label: "List comprehensions — one-line list building",
              note: "# Instead of:\nresult = []\nfor i in range(5):\n    result.append(i * 2)\n\n# Write:\nresult = [i * 2 for i in range(5)]   # [0,2,4,6,8]\n\n# With condition:\nevens = [x for x in range(10) if x % 2 == 0]\n# [0, 2, 4, 6, 8]\n\n# 2D grid of zeros:\ngrid = [[0] * 3 for _ in range(3)]\n# [[0,0,0],[0,0,0],[0,0,0]]\n\nDSA note: building adjacency lists, transforming arrays."
            },
            {
              label: "enumerate() and zip()",
              note: "# enumerate — get index + value\nfor i, val in enumerate(['a','b','c']):\n    print(i, val)    # 0 a, 1 b, 2 c\n\n# zip — pair two lists\nnames  = ['Alice', 'Bob']\nscores = [95, 87]\nfor name, score in zip(names, scores):\n    print(name, score)   # Alice 95, Bob 87\n\nDSA note: zip is useful for two-pointer setups where you\nneed to process two arrays side by side."
            },
            {
              label: "Lambda and sorted() with custom key",
              note: "# Lambda = tiny anonymous function\ndouble = lambda x: x * 2\nprint(double(5))   # 10\n\n# sorted() with key\npairs = [(1, 3), (2, 1), (0, 2)]\nsorted_by_second = sorted(pairs, key=lambda p: p[1])\n# [(2,1), (0,2), (1,3)]\n\n# Sort descending\nsorted_desc = sorted(pairs, key=lambda p: p[1], reverse=True)\n\nDSA note: essential for interval problems, greedy sorting."
            },
          ]
        },
        {
          section: "Week 2 — DSA-Critical Built-ins",
          items: [
            {
              label: "collections.deque — double-ended queue",
              note: "from collections import deque\n\nq = deque()\nq.append(1)       # add right\nq.append(2)\nq.appendleft(0)   # add left\nprint(q)          # deque([0, 1, 2])\nq.popleft()       # remove left: O(1) ✓\nq.pop()           # remove right: O(1) ✓\n\n# Why not just use a list?\n# list.pop(0) is O(n) — shifts all elements.\n# deque.popleft() is O(1). Always use deque for BFS."
            },
            {
              label: "collections.defaultdict — dict with a default value",
              note: "from collections import defaultdict\n\n# defaultdict(int) — missing key returns 0\nfreq = defaultdict(int)\nfor ch in 'hello':\n    freq[ch] += 1      # no KeyError!\n\n# defaultdict(list) — missing key returns []\ngraph = defaultdict(list)\ngraph['A'].append('B')\ngraph['A'].append('C')\n# graph = {'A': ['B', 'C']}\n\nDSA note: this is how you build adjacency lists for graphs."
            },
            {
              label: "collections.Counter — instant frequency map",
              note: "from collections import Counter\n\nc = Counter('aabbbcc')\nprint(c)              # Counter({'b': 3, 'a': 2, 'c': 2})\nprint(c['b'])         # 3\nprint(c.most_common(2))  # [('b',3), ('a',2)]\n\nc2 = Counter([1, 1, 2, 3, 2, 1])\nprint(c2)             # Counter({1:3, 2:2, 3:1})\n\nDSA note: anagram checks, sliding window freq maps."
            },
            {
              label: "heapq — min-heap (priority queue)",
              note: "import heapq\n\nh = []\nheapq.heappush(h, 5)\nheapq.heappush(h, 2)\nheapq.heappush(h, 8)\nprint(heapq.heappop(h))   # 2 — always pops minimum\n\n# Build heap from existing list\narr = [3, 1, 4, 1, 5]\nheapq.heapify(arr)   # in-place, O(n)\n\n# MAX-HEAP trick — negate values\nheapq.heappush(h, -10)   # push negative\nval = -heapq.heappop(h)  # negate on pop → 10\n\nDSA note: Dijkstra's, K largest/smallest, merge K lists."
            },
            {
              label: "float('inf') and float('-inf')",
              note: "# Infinity — for initialising min/max\nmin_val = float('inf')\nmax_val = float('-inf')\n\nfor x in [3, 1, 5, 2]:\n    if x < min_val: min_val = x\n    if x > max_val: max_val = x\n\n# Also useful as 'unreachable' distance in graphs\ndist = {node: float('inf') for node in graph}\ndist[start] = 0\n\nDSA note: appears in almost every graph / DP problem."
            },
            {
              label: "Recursion — how it works, base case, stack",
              note: "# Every recursive function needs:\n# 1. A base case (where it stops)\n# 2. A recursive call that moves toward the base case\n\ndef factorial(n):\n    if n <= 1: return 1        # base case\n    return n * factorial(n-1)  # recursive call\n\nprint(factorial(5))  # 120\n\n# Each call adds a frame to the call stack.\n# Python's default recursion limit is 1000.\n# For deep recursion: import sys; sys.setrecursionlimit(10000)\n\nDSA note: trees and graphs are almost always solved with recursion."
            },
          ]
        },
        {
          section: "Week 3 — Patterns to Write From Memory",
          items: [
            {
              label: "BFS template (Breadth-First Search)",
              note: "from collections import deque\n\ndef bfs(graph, start):\n    visited = set([start])\n    q = deque([start])\n    while q:\n        node = q.popleft()\n        print(node)  # process node\n        for neighbour in graph[node]:\n            if neighbour not in visited:\n                visited.add(neighbour)\n                q.append(neighbour)\n\n# BFS finds SHORTEST PATH in unweighted graphs.\n# Use it when: shortest path, level-by-level traversal."
            },
            {
              label: "DFS template (Depth-First Search)",
              note: "def dfs(graph, node, visited=None):\n    if visited is None: visited = set()\n    visited.add(node)\n    print(node)  # process node\n    for neighbour in graph[node]:\n        if neighbour not in visited:\n            dfs(graph, neighbour, visited)\n\n# DFS goes DEEP before backtracking.\n# Use it when: connected components, cycle detection,\n# topological sort, path existence."
            },
            {
              label: "Two Pointer template",
              note: "def two_sum_sorted(arr, target):\n    l, r = 0, len(arr) - 1\n    while l < r:\n        s = arr[l] + arr[r]\n        if s == target:\n            return [l, r]\n        elif s < target:\n            l += 1   # need bigger sum\n        else:\n            r -= 1   # need smaller sum\n    return []\n\n# Use when: sorted array, pair problems,\n# Reverse String, Valid Palindrome."
            },
            {
              label: "Sliding Window template",
              note: "def longest_no_repeat(s):\n    seen = set()\n    l = 0\n    best = 0\n    for r in range(len(s)):\n        # Shrink window until valid\n        while s[r] in seen:\n            seen.remove(s[l])\n            l += 1\n        seen.add(s[r])\n        best = max(best, r - l + 1)\n    return best\n\n# Window = s[l..r]. Expand r, shrink l when invalid.\n# Use for: substrings, subarrays with constraints."
            },
            {
              label: "Backtracking template",
              note: "def subsets(nums):\n    result = []\n    def backtrack(start, path):\n        result.append(path[:])  # snapshot current path\n        for i in range(start, len(nums)):\n            path.append(nums[i])    # choose\n            backtrack(i + 1, path)  # explore\n            path.pop()              # un-choose\n    backtrack(0, [])\n    return result\n\n# The pattern: choose → explore → un-choose\n# Use for: subsets, permutations, combinations, N-Queens."
            },

        name: "Graphs", weeks: "Wk 6–7",
        concepts: [
          { label: "Graph representations — adjacency list", note: "Two ways to represent a graph:\n\n1. Adjacency List (most common in interviews):\ngraph = defaultdict(list)\ngraph[0].append(1)   # edge 0 → 1\ngraph[0].append(2)   # edge 0 → 2\ngraph[1].append(3)   # edge 1 → 3\n# Space: O(V + E)\n\n2. Adjacency Matrix:\ngraph = [[0]*n for _ in range(n)]\ngraph[0][1] = 1  # edge 0 → 1\n# Space: O(V²) — use for dense graphs\n\nFor most LeetCode problems, you'll either be given\nan adjacency list, an edge list, or a grid (implicit graph)." },
          { label: "Topological Sort", note: "Topological sort = linear ordering of nodes where\nevery directed edge u→v has u before v.\nOnly valid on DAGs (Directed Acyclic Graphs).\n\nKahn's Algorithm (BFS-based):\n1. Compute in-degree of each node\n2. Start with all nodes of in-degree 0\n3. Remove them, reduce neighbours' in-degrees\n4. If any node has in-degree 0 → add to queue\n5. If result has all nodes → valid DAG, else cycle\n\nfrom collections import deque, defaultdict\ndef topoSort(n, edges):\n    graph = defaultdict(list)\n    indegree = [0] * n\n    for u, v in edges:\n        graph[u].append(v)\n        indegree[v] += 1\n    q = deque(i for i in range(n) if indegree[i] == 0)\n    order = []\n    while q:\n        node = q.popleft(); order.append(node)\n        for nb in graph[node]:\n            indegree[nb] -= 1\n            if indegree[nb] == 0: q.append(nb)\n    return order if len(order) == n else []" },
          { label: "Union-Find (Disjoint Set Union)", note: "Union-Find: efficiently answers 'are these two nodes connected?'\n\nclass UnionFind:\n    def __init__(self, n):\n        self.parent = list(range(n))\n        self.rank = [0] * n\n    def find(self, x):\n        if self.parent[x] != x:\n            self.parent[x] = self.find(self.parent[x])  # path compression\n        return self.parent[x]\n    def union(self, x, y):\n        px, py = self.find(x), self.find(y)\n        if px == py: return False\n        if self.rank[px] < self.rank[py]: px, py = py, px\n        self.parent[py] = px\n        if self.rank[px] == self.rank[py]: self.rank[px] += 1\n        return True\n\nUsed in: Number of Connected Components, Redundant Connection." },
        ],
        leetcode: [
          { name: "Number of Islands", link: "https://leetcode.com/problems/number-of-islands/", note: "Difficulty: Medium | Pattern: DFS/BFS on Grid\n\nGrid is an implicit graph. Each '1' cell is a node.\nEdges connect adjacent (up/down/left/right) cells.\n\ndef numIslands(grid):\n    count = 0\n    def dfs(r, c):\n        if r<0 or r>=len(grid) or c<0 or c>=len(grid[0]): return\n        if grid[r][c] != '1': return\n        grid[r][c] = '0'  # mark visited\n        for dr,dc in [(-1,0),(1,0),(0,-1),(0,1)]:\n            dfs(r+dr, c+dc)\n    for r in range(len(grid)):\n        for c in range(len(grid[0])):\n            if grid[r][c] == '1': dfs(r,c); count+=1\n    return count" },
          { name: "Clone Graph", link: "https://leetcode.com/problems/clone-graph/", note: "Difficulty: Medium | Pattern: DFS + Hash Map\n\nClone each node exactly once. Use a dict to map\noriginal node → cloned node to avoid infinite loops.\n\ndef cloneGraph(node):\n    cloned = {}\n    def dfs(n):\n        if n in cloned: return cloned[n]\n        copy = Node(n.val)\n        cloned[n] = copy\n        for nb in n.neighbors:\n            copy.neighbors.append(dfs(nb))\n        return copy\n    return dfs(node) if node else None" },
          { name: "Course Schedule", link: "https://leetcode.com/problems/course-schedule/", note: "Difficulty: Medium | Pattern: Cycle Detection / Topological Sort\n\nBuild directed graph: prerequisite → course.\nIf there's a cycle, you can't finish all courses.\n\nApproach 1: Topological sort (Kahn's) — if all nodes processed, no cycle.\nApproach 2: DFS with 3 states — unvisited, visiting, visited.\n  If you reach a 'visiting' node again → cycle!\n\ndef canFinish(numCourses, prerequisites):\n    graph = defaultdict(list)\n    for a, b in prerequisites: graph[b].append(a)\n    state = [0] * numCourses  # 0=unvisited 1=visiting 2=done\n    def dfs(node):\n        if state[node] == 1: return False  # cycle\n        if state[node] == 2: return True\n        state[node] = 1\n        for nb in graph[node]:\n            if not dfs(nb): return False\n        state[node] = 2; return True\n    return all(dfs(i) for i in range(numCourses))" },
          { name: "Word Ladder", link: "https://leetcode.com/problems/word-ladder/", note: "Difficulty: Hard | Pattern: BFS Shortest Path\n\nEach word is a node. Edge exists if words differ by 1 letter.\nFind shortest path from beginWord to endWord.\n\nKey insight: BFS guarantees shortest path.\nFor each word, try changing each character to a-z.\nIf the result is in wordList → valid neighbour.\n\nTime: O(M² × N) where M=word length, N=wordList size." },
        ]
      },
      {
        name: "Backtracking", weeks: "Wk 7–8",
        note: "⚡ Microsoft asks backtracking more than most companies. Don't skip.",
        concepts: [
          { label: "The choose → explore → un-choose pattern", note: "Backtracking = systematic trial-and-error.\nYou build a solution incrementally, abandoning branches\nthat can't lead to a valid solution.\n\nThe pattern is ALWAYS:\n1. Choose: add something to your current path\n2. Explore: recurse deeper\n3. Un-choose: remove it (backtrack)\n\ndef backtrack(path, choices):\n    if is_solution(path):\n        result.append(path[:])\n        return\n    for choice in choices:\n        if is_valid(choice, path):\n            path.append(choice)    # 1. choose\n            backtrack(path, ...)   # 2. explore\n            path.pop()             # 3. un-choose\n\nThis framework solves: subsets, permutations, combinations,\nN-Queens, Sudoku, Word Search." },
          { label: "Pruning — skipping invalid branches early", note: "Pruning = adding checks to avoid exploring dead ends.\nThis is what separates O(n!) from manageable runtime.\n\nExample: Combination Sum with target\n  After sorting, if current num > remaining target → stop.\n  No need to try larger numbers.\n\nExample: N-Queens\n  Check column, diagonal, anti-diagonal conflicts.\n  If placing queen causes conflict → skip that column.\n\nAlways ask: 'can I tell early that this branch is hopeless?'\nIf yes, add a check before the recursive call." },
        ],
        leetcode: [
          { name: "Subsets", link: "https://leetcode.com/problems/subsets/", note: "Difficulty: Medium | Pattern: Backtracking\n\nGenerate all 2^n subsets.\n\ndef subsets(nums):\n    result = []\n    def bt(start, path):\n        result.append(path[:])   # every path is a valid subset\n        for i in range(start, len(nums)):\n            path.append(nums[i])\n            bt(i+1, path)\n            path.pop()\n    bt(0, [])\n    return result\n\nNote: we append at the START (before the loop),\nnot at a base case. Every partial path is valid." },
          { name: "Permutations", link: "https://leetcode.com/problems/permutations/", note: "Difficulty: Medium | Pattern: Backtracking with used-set\n\ndef permute(nums):\n    result = []\n    def bt(path, used):\n        if len(path) == len(nums):\n            result.append(path[:]); return\n        for i, n in enumerate(nums):\n            if i not in used:\n                path.append(n); used.add(i)\n                bt(path, used)\n                path.pop(); used.remove(i)\n    bt([], set())\n    return result\n\nDifference from subsets: can pick same index multiple times\nin different positions, so track which indices are 'used'." },
          { name: "Combination Sum", link: "https://leetcode.com/problems/combination-sum/", note: "Difficulty: Medium | Pattern: Backtracking with reuse\n\nCan reuse the same element. No duplicates in input.\n\ndef combinationSum(candidates, target):\n    candidates.sort()  # enables early pruning\n    result = []\n    def bt(start, path, remaining):\n        if remaining == 0: result.append(path[:]); return\n        for i in range(start, len(candidates)):\n            if candidates[i] > remaining: break  # pruning!\n            path.append(candidates[i])\n            bt(i, path, remaining - candidates[i])  # i not i+1 (reuse)\n            path.pop()\n    bt(0, [], target)\n    return result" },
          { name: "Word Search", link: "https://leetcode.com/problems/word-search/", note: "Difficulty: Medium | Pattern: DFS Backtracking on Grid\n\nFor each cell, DFS trying to match the word.\nMark visited by temporarily replacing cell with '#'.\nRestore after backtracking.\n\ndef exist(board, word):\n    rows, cols = len(board), len(board[0])\n    def dfs(r, c, i):\n        if i == len(word): return True\n        if r<0 or r>=rows or c<0 or c>=cols: return False\n        if board[r][c] != word[i]: return False\n        tmp, board[r][c] = board[r][c], '#'  # mark\n        found = any(dfs(r+dr,c+dc,i+1) for dr,dc in [(-1,0),(1,0),(0,-1),(0,1)])\n        board[r][c] = tmp  # restore\n        return found\n    return any(dfs(r,c,0) for r in range(rows) for c in range(cols))" },
        ]
      },
      {
        name: "Dynamic Programming", weeks: "Wk 8–10",
        concepts: [
          { label: "Memoization (Top-down DP)", note: "Memoization = recursion + cache.\nSolve the problem recursively, but cache results\nso you never compute the same subproblem twice.\n\nfrom functools import lru_cache\n\n@lru_cache(maxsize=None)\ndef fib(n):\n    if n <= 1: return n\n    return fib(n-1) + fib(n-2)\n\nOr manually:\nmemo = {}\ndef fib(n):\n    if n in memo: return memo[n]\n    if n <= 1: return n\n    memo[n] = fib(n-1) + fib(n-2)\n    return memo[n]\n\nTime: O(n) — each subproblem solved once.\nThink top-down: big problem → smaller subproblems." },
          { label: "Tabulation (Bottom-up DP)", note: "Tabulation = fill a table iteratively from base cases up.\nNo recursion — avoids stack overflow for large inputs.\n\nFibonacci:\ndp = [0] * (n+1)\ndp[1] = 1\nfor i in range(2, n+1):\n    dp[i] = dp[i-1] + dp[i-2]\nreturn dp[n]\n\nThink bottom-up: solve small subproblems first,\nbuild toward the answer.\n\nSpace optimization: if dp[i] only needs dp[i-1] and dp[i-2],\nyou only need two variables:\na, b = 0, 1\nfor _ in range(n-1): a, b = b, a+b" },
          { label: "2D DP — grid and string problems", note: "2D DP uses a grid where dp[i][j] depends on\nnearby cells.\n\nLongest Common Subsequence:\ndp[i][j] = LCS of text1[:i] and text2[:j]\n\nif text1[i-1] == text2[j-1]:\n    dp[i][j] = dp[i-1][j-1] + 1\nelse:\n    dp[i][j] = max(dp[i-1][j], dp[i][j-1])\n\nCommon 2D DP problems:\n- LCS (strings)\n- Edit Distance (strings)\n- Unique Paths (grid)\n- Coin Change 2 (knapsack variant)\n\nAlways define: what does dp[i][j] represent?" },
        ],
        leetcode: [
          { name: "Climbing Stairs", link: "https://leetcode.com/problems/climbing-stairs/", note: "Difficulty: Easy | Pattern: 1D DP (Fibonacci variant)\n\ndp[i] = number of ways to reach step i\ndp[1] = 1, dp[2] = 2\ndp[i] = dp[i-1] + dp[i-2]\n\nThis is literally Fibonacci. If you're on step i,\nyou came from i-1 (one step) or i-2 (two steps)." },
          { name: "Coin Change", link: "https://leetcode.com/problems/coin-change/", note: "Difficulty: Medium | Pattern: 1D DP (Unbounded Knapsack)\n\ndp[i] = min coins to make amount i\n\ndp = [inf] * (amount+1)\ndp[0] = 0\nfor coin in coins:\n    for i in range(coin, amount+1):\n        dp[i] = min(dp[i], dp[i-coin] + 1)\nreturn dp[amount] if dp[amount] != inf else -1\n\nInner loop builds up: for each coin, update all amounts." },
          { name: "Longest Common Subsequence", link: "https://leetcode.com/problems/longest-common-subsequence/", note: "Difficulty: Medium | Pattern: 2D DP\n\nm, n = len(text1), len(text2)\ndp = [[0]*(n+1) for _ in range(m+1)]\nfor i in range(1, m+1):\n    for j in range(1, n+1):\n        if text1[i-1] == text2[j-1]:\n            dp[i][j] = dp[i-1][j-1] + 1\n        else:\n            dp[i][j] = max(dp[i-1][j], dp[i][j-1])\nreturn dp[m][n]" },
          { name: "Edit Distance", link: "https://leetcode.com/problems/edit-distance/", note: "Difficulty: Medium | Pattern: 2D DP (String transformation)\n\ndp[i][j] = min ops to convert word1[:i] to word2[:j]\n\nif word1[i-1] == word2[j-1]: dp[i][j] = dp[i-1][j-1]\nelse: dp[i][j] = 1 + min(\n    dp[i-1][j],    # delete\n    dp[i][j-1],    # insert\n    dp[i-1][j-1]   # replace\n)\n\nBase case: dp[i][0] = i (delete all), dp[0][j] = j (insert all)." },
        ]
      },
    ]
  },

  // ── PHASE 2: SYSTEM DESIGN ─────────────────────────────
  {
    id: 2, label: "PHASE 03", title: "System Design",
    duration: "Weeks 8–14", color: "#A8FF3E",
    goal: "Go from zero to confidently designing scalable systems for 45 minutes. Microsoft expects Azure-first thinking — learn their ecosystem, not just generic concepts.",
    warning: "Internship interviews CAN include simplified system design, especially for competitive slots. Don't gamble — prep it.",
    approach: "The framework: (1) Clarify requirements — functional & non-functional. (2) Estimate scale — DAU, QPS, storage. (3) High-level design — boxes and arrows. (4) Deep dive — 2-3 components in detail. (5) Trade-offs — always frame choices as trade-offs, never absolutes.",
    resource: "Alex Xu 'System Design Interview Vol 1' + Gaurav Sen YouTube",
    concepts: [
      {
        section: "Fundamentals",
        items: [
          { label: "Horizontal vs vertical scaling", note: "Vertical scaling: bigger machine (more CPU/RAM). Simple but has a ceiling. Expensive.\nHorizontal scaling: more machines. Theoretically unlimited. Needs load balancer.\n\nWhen MS asks: they want to see you default to horizontal scaling\nfor internet-scale systems (millions of users).\n\nTrade-off: horizontal adds complexity (distributed coordination,\ndata consistency, network latency)." },
          { label: "CAP Theorem", note: "A distributed system can only guarantee 2 of 3:\n  C = Consistency (all nodes see same data)\n  A = Availability (always responds)\n  P = Partition Tolerance (works despite network splits)\n\nSince P (network partitions) are unavoidable in distributed systems,\nyou're really choosing between CP and AP.\n\nCP example: bank transactions (consistency is critical)\nAP example: social media feed (slightly stale is fine)\n\nMS angle: CosmosDB lets you tune this — it offers multiple\nconsistency levels (strong, bounded staleness, eventual, etc.)" },
          { label: "SQL vs NoSQL — when to pick which", note: "SQL (PostgreSQL, Azure SQL):\n  ✓ Complex queries, joins\n  ✓ Strong consistency (ACID transactions)\n  ✓ Well-defined schema\n  Use for: financial data, user accounts, inventory\n\nNoSQL (CosmosDB, MongoDB, Redis):\n  ✓ Horizontal scaling\n  ✓ Flexible schema (documents)\n  ✓ Extremely high throughput (key-value)\n  Use for: user sessions, product catalog, real-time feeds\n\nMS interview tip: knowing CosmosDB (MS's NoSQL) by name + its\nconsistency models will impress." },
          { label: "Caching strategies", note: "Cache = fast in-memory store (Redis, Memcached) in front of slow DB.\n\nCache-aside (lazy loading): app checks cache first.\n  If miss → read DB → write to cache → return.\n  Cache only holds what's actually requested.\n\nWrite-through: write to cache AND DB simultaneously.\n  Cache always consistent. Extra write latency.\n\nWrite-back (write-behind): write to cache only, flush to DB async.\n  Faster writes. Risk of data loss.\n\nCache invalidation: hardest problem. Options:\n  TTL (expire after N seconds), event-driven (invalidate on write)." },
          { label: "Message queues — when to use", note: "Message queue (Azure Service Bus, Kafka) decouples services.\n\nUse when:\n- Task takes too long for a synchronous response (email sending)\n- Need to absorb traffic spikes (buffer between producer/consumer)\n- Fan-out: one event → many consumers\n\nDirect API call is fine when:\n- Response needed immediately\n- Simple, fast operation\n- Strong consistency required\n\nMS expects you to know: Azure Service Bus (guaranteed delivery, ordering)\nvs Azure Event Hub (high-throughput streaming, Kafka-compatible)." },
        ]
      },
      {
        section: "Azure Ecosystem — Use These Names in Interviews",
        items: [
          { label: "Azure Blob Storage", note: "Object storage for files, images, videos, backups.\nUnstructured data, any size.\n\nUse for: user uploads, static assets, ML training datasets,\nbackup files, log archives.\n\nTiers: Hot (frequent access), Cool (infrequent), Archive (rare).\n\nMS tip: 'I'd store the user's profile photos in Azure Blob Storage\nwith a CDN in front for low-latency delivery' — this sentence\nwill make your interviewer happy." },
          { label: "Azure CosmosDB", note: "Microsoft's globally distributed NoSQL database.\nSupports multiple APIs: SQL, MongoDB, Cassandra, Table.\n\nKey features:\n- 99.999% SLA (five nines)\n- < 10ms reads/writes globally\n- Tunable consistency levels (strong → eventual)\n- Multi-region writes\n\nUse for: user profiles, product catalog, real-time leaderboards,\nIoT telemetry, gaming state.\n\nThis is THE NoSQL database to mention in MS design interviews." },
          { label: "Azure Service Bus vs Event Hub", note: "Service Bus: traditional message queue / pub-sub.\n  - Guaranteed delivery (at-least-once)\n  - Message ordering (FIFO queues)\n  - Dead-letter queue for failures\n  - Use for: order processing, task queues, workflow\n\nEvent Hub: high-throughput event streaming (like Kafka).\n  - Millions of events per second\n  - Retain events for replay (up to 90 days)\n  - Consumer groups for parallel processing\n  - Use for: telemetry, clickstream, real-time analytics\n\nRule of thumb: task → Service Bus, stream → Event Hub." },
          { label: "Azure Functions — serverless", note: "Run code without managing servers.\nTriggered by events: HTTP, queue messages, timer, blob uploads.\n\nPros:\n  - Scale to zero (no cost when idle)\n  - Auto-scales with load\n  - Pay per execution\n\nCons:\n  - Cold start latency (first request after idle is slow)\n  - Not for long-running tasks (5–10 min timeout)\n  - Stateless (can't store data in memory between calls)\n\nMS design use case: 'I'd use an Azure Function triggered by\nService Bus to process each order asynchronously'." },
        ]
      },
      {
        section: "Classic Designs — Master These",
        items: [
          { label: "URL Shortener (bit.ly)", note: "Functional requirements: shorten URL, redirect to original.\nNon-functional: < 100ms redirect, 100M URLs, 10:1 read/write ratio.\n\nCore design:\n1. Generate unique 6-char code: base62 encode a counter or hash\n2. Store: code → original_url in DB (CosmosDB or Redis cache)\n3. Redirect: GET /{code} → lookup → 301/302 redirect\n\nScale:\n- Cache hot URLs in Redis (most URLs are rarely accessed)\n- Multiple read replicas for DB\n- Rate limit creation API\n\nTrade-off: 301 (permanent, browser caches) vs 302 (temporary,\nevery redirect hits your server — better for analytics)." },
          { label: "Rate Limiter", note: "Limits number of requests per user per time window.\n\nAlgorithms:\n1. Fixed Window: count requests in fixed time slots. Simple.\n   Problem: burst at window boundary (2x allowed requests).\n\n2. Sliding Window: track exact timestamps. Accurate.\n   Problem: memory per user.\n\n3. Token Bucket: tokens added at rate R, bucket max B.\n   Request consumes 1 token. If empty, reject.\n   Allows bursts (empty then refill).\n\n4. Leaky Bucket: fixed processing rate regardless of burst.\n\nImplementation: Redis + Lua script for atomic increment.\nDistributed: centralized Redis or gossip protocol sync." },
          { label: "Design OneDrive / Dropbox", note: "This is a classic MS interview question (it's their product).\n\nKey challenges:\n1. File chunking: split large files into 4MB chunks.\n   Upload chunks independently → resume on failure.\n   Hash each chunk → dedup (same chunk never uploaded twice).\n\n2. Sync protocol:\n   Client watches for file changes.\n   Sends diff (changed chunks only) to server.\n   Server notifies other clients via WebSocket/long-poll.\n\n3. Conflict resolution:\n   Two clients edit same file offline.\n   Create conflicted copy with timestamp.\n\nStorage: Azure Blob for chunks. CosmosDB for metadata\n(file tree, chunk references, sharing permissions)." },
          { label: "Notification System", note: "Send push, email, and SMS notifications at scale.\n\nArchitecture:\n1. API server receives notification request\n2. Publishes to message queue (Azure Service Bus)\n3. Workers consume by type: push worker, email worker, SMS worker\n4. Each worker calls 3rd party provider (FCM, SendGrid, Twilio)\n5. Track delivery status in DB\n\nKey design decisions:\n- Why queue? Absorb spikes, decouple services, retry on failure.\n- Fan-out: for 10M users, must be async — don't block the API.\n- Rate limiting per provider: SendGrid has request limits.\n- Dead letter queue: failed notifications for manual review." },
        ]
      },
    ]
  },

  // ── PHASE 4: INTERVIEW EXECUTION ──────────────────────
  {
    id: 4, label: "PHASE 05", title: "Interview Execution",
    duration: "Weeks 13–16", color: "#FFD700",
    goal: "Technical skill means nothing if you freeze under pressure. Train the interview itself, not just the content. Most rejections happen here.",
    warning: "Silence in a coding interview is deadly. Interviewers aren't watching your code — they're evaluating how you think. If you're not talking, you're losing marks.",
    codingRules: [
      { label: "Think out loud from second one", note: "The moment you read the problem, start narrating.\n'So we're given an array and need to find... okay. The brute force would be... that's O(n²). Can we do better? What if we used a hash map...'\n\nYour thinking IS the interview. Silence makes interviewers anxious.\nThey want to see your problem-solving process, not just the answer." },
      { label: "Clarify edge cases before writing any code", note: "Ask before coding:\n- 'Can the input be empty?'\n- 'Can values be negative?'\n- 'Should I handle duplicates?'\n- 'Is the array sorted?'\n\nThis shows engineering maturity. It also helps you avoid\nwriting code that fails on edge cases.\n\nTarget: 2-3 clarifying questions in under 2 minutes." },
      { label: "State brute force first, then optimize", note: "Always say: 'The brute force would be X — that's O(n²) time and O(1) space. Can we do better?'\n\nThen optimize. This shows:\n1. You understand the problem\n2. You have structured thinking\n3. You know time/space complexity\n\nNever just start with the optimal solution with no explanation." },
      { label: "Trace through an example by hand before submitting", note: "Before you say 'I'm done', trace your code on a small example.\nStep through it line by line. Check edge cases.\n\nSay: 'Let me trace through with [1,2,3]...'\n\nThis catches ~80% of bugs before the interviewer sees them.\nFinding your own bugs is MUCH better than the interviewer finding them." },
      { label: "Name variables properly", note: "WRONG:\ndef fn(x, arr, tmp): ...\n\nCORRECT:\ndef twoSum(nums, target): ...\n\nVariable names show that you're thinking about the problem.\nPoor naming suggests you're just memorizing patterns, not understanding.\n\nUse: left/right for pointers, freq for frequency maps,\nvisited for DFS sets, memo for memoization." },

// ═══════════════════════════════════════════════════════════
//  STATE & PERSISTENCE
// ═══════════════════════════════════════════════════════════
let state = {
  activePhase: 0,
  activeLang: 'Python',
  checked: {},
  username: null,
  binId: null,
  apiKey: null,
  syncStatus: 'idle'  // idle | saving | saved | error
};

// ── Cloud sync via JSONBin ──────────────────────────────────
// Each user gets their own bin. We store binId+apiKey in
// localStorage so they only enter it once per device.
// ?user=moses in the URL is cosmetic only (sharing-friendly).

const JSONBIN_API = 'https://api.jsonbin.io/v3/b';

function lsKey(username) { return `msprep_${username}`; }

async function cloudLoad(username, apiKey) {
  const stored = JSON.parse(localStorage.getItem(lsKey(username)) || '{}');
  state.binId = stored.binId || null;

  if (!state.binId) return null; // first time on this device
  try {
    const res = await fetch(`${JSONBIN_API}/${state.binId}/latest`, {
      headers: { 'X-Master-Key': apiKey }
    });
    if (!res.ok) return null;
    const json = await res.json();
    return json.record?.checked || null;
  } catch(e) { return null; }
}

async function cloudSave(checked) {
  if (!state.binId || !state.apiKey) return;
  setSyncStatus('saving');
  try {
    await fetch(`${JSONBIN_API}/${state.binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': state.apiKey },
      body: JSON.stringify({ checked })
    });
    setSyncStatus('saved');
  } catch(e) { setSyncStatus('error'); }
}

async function cloudCreate(username, apiKey) {
  const res = await fetch(JSONBIN_API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': apiKey,
      'X-Bin-Name': `msprep_${username}`,
      'X-Bin-Private': 'true'
    },
    body: JSON.stringify({ checked: {} })
  });
  if (!res.ok) throw new Error('Failed to create bin');
  const json = await res.json();
  return json.metadata.id;
}

function setSyncStatus(s) {
  state.syncStatus = s;
  const el = document.getElementById('sync-status');
  if (!el) return;
  const labels = { idle: '', saving: '↑ syncing…', saved: '✓ synced', error: '⚠ sync failed' };
  const colors = { idle: '', saving: '#607080', saved: '#4A9A60', error: '#FF6060' };
  el.textContent = labels[s];
  el.style.color = colors[s];
}

// Debounced save — wait 1.5s after last toggle before saving
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => cloudSave(state.checked), 1500);
}

// ── Local fallback ──────────────────────────────────────────
function localSave() {
  if (!state.username) return;
  const stored = JSON.parse(localStorage.getItem(lsKey(state.username)) || '{}');
  stored.checked = state.checked;
  if (state.binId) stored.binId = state.binId;
  localStorage.setItem(lsKey(state.username), JSON.stringify(stored));
}

function localLoad(username) {
  const stored = JSON.parse(localStorage.getItem(lsKey(username)) || '{}');
  state.binId = stored.binId || null;
  return stored.checked || null;
}

function toggle(key) {
  state.checked[key] = !state.checked[key];
  if (!state.checked[key]) delete state.checked[key];
  localSave();
  scheduleSave();
  updateProgress();
  const el = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if (el) {
    const done = !!state.checked[key];
    el.classList.toggle('done', done);
    const box = el.querySelector('.checkbox');
    if (box) {
      box.style.background = done ? currentColor() : 'transparent';
      box.style.borderColor = done ? currentColor() : '#2A3A4A';
      box.textContent = done ? '✓' : '';
    }
  }
}

function currentColor() {
  return PHASES[state.activePhase]?.color || '#00D4FF';
}

function allKeys() {
  const keys = [];
  PHASES.forEach((p, pi) => {
    if (p.topics) p.topics.forEach((t, ti) => {
      t.concepts?.forEach((_,ci) => keys.push(`p${pi}_t${ti}_c${ci}`));
      t.leetcode?.forEach((_,li) => keys.push(`p${pi}_t${ti}_lc${li}`));
    });
    if (p.content) {
      ['Python','C#'].forEach(lang => {
        p.content[lang]?.forEach((sec, si) => {
          sec.items?.forEach((_,ii) => keys.push(`p${pi}_lang_${lang}_${si}_${ii}`));
        });
      });
    }
    if (p.concepts) p.concepts.forEach((sec, si) => {
      sec.items?.forEach((_,ii) => keys.push(`p${pi}_sd_${si}_${ii}`));
    });
    if (p.projects) p.projects.forEach((proj, pj) => {
      proj.what?.forEach((_,wi) => keys.push(`p${pi}_proj_${pj}_${wi}`));
    });
    if (p.codingRules) p.codingRules.forEach((_,ri) => keys.push(`p${pi}_rule_${ri}`));
    if (p.behavioral) p.behavioral.forEach((_,bi) => keys.push(`p${pi}_behav_${bi}`));
  });
  return keys;
}

function updateProgress() {
  const keys = allKeys();
  const done = keys.filter(k => state.checked[k]).length;
  const pct = keys.length ? Math.round(done / keys.length * 100) : 0;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = `${done} / ${keys.length} items completed`;
}

// ── Setup modal ─────────────────────────────────────────────
function showSetupModal(onDone) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:20px;`;

  overlay.innerHTML = `
    <div style="background:#0D1117;border:1px solid #1A2030;border-top:3px solid #00D4FF;
                border-radius:3px;padding:32px;max-width:480px;width:100%;font-family:'IBM Plex Mono',monospace;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.15em;color:#fff;margin-bottom:6px">SET UP SYNC</div>
      <div style="font-size:11px;color:#607080;line-height:1.7;margin-bottom:24px">
        Your progress will sync across all your devices.<br>
        Each person needs their own JSONBin API key — it's free.
      </div>

      <div style="font-size:10px;color:#405060;letter-spacing:.12em;font-weight:700;margin-bottom:18px">HOW TO GET YOUR FREE API KEY (2 min)</div>
      <ol style="font-size:11px;color:#607080;line-height:2;padding-left:18px;margin-bottom:24px">
        <li>Go to <a href="https://jsonbin.io" target="_blank" style="color:#00D4FF">jsonbin.io</a></li>
        <li>Sign in with GitHub (you already have one)</li>
        <li>Go to API Keys → Copy your Master Key</li>
        <li>Paste it below</li>
      </ol>

      <div style="margin-bottom:14px">
        <label style="font-size:10px;color:#405060;letter-spacing:.12em;font-weight:700;display:block;margin-bottom:6px">YOUR NAME (lowercase, no spaces)</label>
        <input id="setup-name" placeholder="e.g. moses" style="width:100%;background:#080B0F;border:1px solid #2A3A4A;color:#C8D8E8;
               padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:2px;outline:none;">
      </div>

      <div style="margin-bottom:22px">
        <label style="font-size:10px;color:#405060;letter-spacing:.12em;font-weight:700;display:block;margin-bottom:6px">JSONBIN MASTER KEY</label>
        <input id="setup-key" type="password" placeholder="$2b$10$..." style="width:100%;background:#080B0F;border:1px solid #2A3A4A;color:#C8D8E8;
               padding:10px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:2px;outline:none;">
        <div style="font-size:10px;color:#304050;margin-top:5px">Stored only in your browser. Never sent anywhere except JSONBin.</div>
      </div>

      <div id="setup-error" style="font-size:11px;color:#FF6060;margin-bottom:12px;display:none"></div>

      <button id="setup-btn" style="width:100%;background:#00D4FF;color:#000;border:none;padding:12px;
              font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.1em;
              cursor:pointer;border-radius:2px;">CONNECT & START</button>

      <div style="text-align:center;margin-top:14px">
        <button id="setup-skip" style="background:none;border:none;color:#304050;font-family:'IBM Plex Mono',monospace;
                font-size:11px;cursor:pointer;text-decoration:underline;">Skip for now — use local only</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  document.getElementById('setup-btn').onclick = async () => {
    const name = document.getElementById('setup-name').value.trim().toLowerCase().replace(/\s+/g,'_');
    const key  = document.getElementById('setup-key').value.trim();
    const errEl = document.getElementById('setup-error');
    const btn = document.getElementById('setup-btn');

    if (!name) { errEl.textContent = 'Enter your name.'; errEl.style.display='block'; return; }
    if (!key)  { errEl.textContent = 'Enter your API key.'; errEl.style.display='block'; return; }

    btn.textContent = 'CONNECTING…'; btn.disabled = true;

    try {
      state.username = name;
      state.apiKey = key;

      // Check if they already have a bin from another device
      const existing = localLoad(name);
      if (state.binId) {
        // bin exists from localStorage — just verify it works
        const cloud = await cloudLoad(name, key);
        if (cloud) state.checked = cloud;
        else if (existing) state.checked = existing;
      } else {
        // First time ever — create a new bin
        const binId = await cloudCreate(name, key);
        state.binId = binId;
        if (existing) {
          // Migrate any existing local data up to cloud
          state.checked = existing;
          await cloudSave(existing);
        }
      }

      // Save credentials to localStorage
      const stored = JSON.parse(localStorage.getItem(lsKey(name)) || '{}');
      stored.binId = state.binId;
      stored.apiKey = key;  // save key so they don't re-enter on this device
      stored.checked = state.checked;
      localStorage.setItem(lsKey(name), JSON.stringify(stored));

      document.body.removeChild(overlay);
      onDone();
    } catch(e) {
      errEl.textContent = 'Could not connect. Check your API key and try again.';
      errEl.style.display = 'block';
      btn.textContent = 'CONNECT & START'; btn.disabled = false;
    }
  };

  document.getElementById('setup-skip').onclick = () => {
    state.username = 'local';
    const existing = localLoad('local');
    if (existing) state.checked = existing;
    document.body.removeChild(overlay);
    onDone();
  };
}

// ── Init ────────────────────────────────────────────────────
async function initUser() {
  // Check ?user= param for convenience link sharing
  const urlUser = new URLSearchParams(window.location.search).get('user');

  // Check if we already know this user on this device
  const tryUser = urlUser || 'local';
  const stored = JSON.parse(localStorage.getItem(lsKey(tryUser)) || '{}');

  if (stored.apiKey && stored.binId) {
    // Returning user on known device — auto-login
    state.username = tryUser;
    state.apiKey = stored.apiKey;
    state.binId = stored.binId;
    state.checked = stored.checked || {};

    // Load from cloud in background
    cloudLoad(tryUser, stored.apiKey).then(cloud => {
      if (cloud) {
        state.checked = cloud;
        localSave();
        renderMain();
        updateProgress();
        setSyncStatus('saved');
      }
    });

    renderApp();
  } else if (stored.checked && !stored.apiKey) {
    // Has local data but no cloud setup
    state.username = tryUser;
    state.checked = stored.checked;
    renderApp();
    showSetupModal(() => { renderApp(); });
  } else {
    // Brand new — show setup first
    renderApp();
    showSetupModal(() => { renderApp(); });
  }
}

// ═══════════════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '';
  PHASES.forEach((p, i) => {
    if (i === 5) { // divider before schedule
      const d = document.createElement('div'); d.className = 'nav-divider'; nav.appendChild(d);
    }
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === state.activePhase ? ' active' : '');
    btn.style.setProperty('--phase-color', p.color);
    btn.innerHTML = `<div class="nav-label">${p.label}</div><div class="nav-title">${p.title}</div><div class="nav-dur">${p.duration}</div>`;
    btn.onclick = () => { state.activePhase = i; renderSidebar(); renderMain(); };
    nav.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function checkRow(key, label, note, color) {
  const done = !!state.checked[key];
  const div = document.createElement('div');
  div.className = 'check-row' + (done ? ' done' : '');
  div.setAttribute('data-key', key);

  const hasNote = note && note.trim();
  div.innerHTML = `
    <div class="checkbox" style="background:${done ? color : 'transparent'};border-color:${done ? color : '#2A3A4A'}">${done ? '✓' : ''}</div>
    <div style="flex:1">
      <div class="check-label" style="display:flex;align-items:center;gap:8px;justify-content:space-between">
        <span>${escHtml(label)}</span>
        ${hasNote ? `<span style="font-size:10px;color:${color};flex-shrink:0;opacity:.7;cursor:pointer" data-note-toggle>▸ notes</span>` : ''}
      </div>
      ${hasNote ? `<div class="notes-panel"><pre>${escHtml(note)}</pre></div>` : ''}
    </div>`;

  div.querySelector('.checkbox').addEventListener('click', e => { e.stopPropagation(); toggle(key); });

  if (hasNote) {
    const noteBtn = div.querySelector('[data-note-toggle]');
    const panel = div.querySelector('.notes-panel');
    noteBtn.addEventListener('click', e => {
      e.stopPropagation();
      const open = panel.classList.toggle('open');
      noteBtn.textContent = open ? '▾ notes' : '▸ notes';
    });
  }

  return div;
}

function sectionHead(text) {
  const d = document.createElement('div');
  d.className = 'section-head';
  d.textContent = text;
  return d;
}

function card(children) {
  const d = document.createElement('div');
  d.className = 'card';
  children.forEach(c => c && d.appendChild(c));
  return d;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function warn(text) {
  const d = document.createElement('div');
  d.className = 'warn';
  d.textContent = '⚠ ' + text;
  return d;
}

function approach(text, color) {
  const d = document.createElement('div');
  d.className = 'approach';
  d.style.borderLeftColor = color;
  d.textContent = text;
  return d;
}

function phaseHeader(p) {
  const wrap = document.createElement('div');
  wrap.className = 'phase-header';
  wrap.innerHTML = `
    <div class="phase-num" style="color:${p.color}">${String(p.id+1).padStart(2,'0')}</div>
    <div class="phase-eyebrow" style="color:${p.color}">${p.label} · ${p.duration}</div>
    <div class="phase-title">${p.title}</div>
    <div class="phase-goal">${escHtml(p.goal)}</div>`;
  return wrap;
}

// ═══════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════
function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const p = PHASES[state.activePhase];
  const color = p.color;

  // PHASE 0: Language Foundations
  if (p.id === 0) {
    main.appendChild(phaseHeader(p));
    main.appendChild(warn(p.warning));
    main.appendChild(approach(p.approach, color));

    // GitHub hosting banner
    const banner = document.createElement('div');
    banner.id = 'gh-banner';
    banner.innerHTML = `<strong>📁 GitHub Pages Hosting:</strong> Push this <code>index.html</code> file to a repo → Settings → Pages → Source: main branch. Your URL: <code>https://yourusername.github.io/reponame</code>. That's it. No build step.`;
    main.appendChild(banner);

    // Lang tabs
    const tabs = document.createElement('div');
    tabs.className = 'lang-tabs';
    ['Python','C#'].forEach(lang => {
      const btn = document.createElement('button');
      btn.className = 'lang-tab' + (state.activeLang === lang ? ' active' : '');
      btn.style.borderColor = state.activeLang === lang ? color : '';
      btn.style.background = state.activeLang === lang ? color : '';
      btn.style.color = state.activeLang === lang ? '#000' : '';
      btn.textContent = lang;
      btn.onclick = () => { state.activeLang = lang; renderMain(); };
      tabs.appendChild(btn);
    });
    main.appendChild(tabs);

    const langData = p.content[state.activeLang];
    langData.forEach((sec, si) => {
      main.appendChild(sectionHead(sec.section));
      const items = sec.items.map((item, ii) =>
        checkRow(`p0_lang_${state.activeLang}_${si}_${ii}`, item.label, item.note, color)
      );
      main.appendChild(card(items));
    });
    return;
  }

  // PHASE 1: DSA
  if (p.id === 1) {
    main.appendChild(phaseHeader(p));
    main.appendChild(warn(p.warning));
    main.appendChild(approach(p.approach + ' | Resource: ' + p.resource, color));

    p.topics.forEach((topic, ti) => {
      // Topic header card
      const topicHead = document.createElement('div');
      topicHead.style.cssText = `display:flex;align-items:center;gap:10px;margin:22px 0 10px;`;
      topicHead.innerHTML = `
        <span class="tag" style="background:${color}18;color:${color};border:1px solid ${color}30">${topic.weeks}</span>
        <span style="font-size:15px;font-weight:700;color:#fff">${topic.name}</span>
        ${topic.note ? `<span style="font-size:11px;color:#FFB830;margin-left:4px">${topic.note}</span>` : ''}`;
      main.appendChild(topicHead);

      // Concepts
      main.appendChild(sectionHead('Concepts'));
      const conceptItems = topic.concepts.map((c, ci) =>
        checkRow(`p1_t${ti}_c${ci}`, c.label, c.note, color)
      );
      main.appendChild(card(conceptItems));

      // LeetCode
      main.appendChild(sectionHead('LeetCode Problems'));
      const lcItems = topic.leetcode.map((lc, li) => {
        const row = checkRow(`p1_t${ti}_lc${li}`, lc.name, lc.note, color);
        // Make name a link
        const labelSpan = row.querySelector('.check-label span');
        if (labelSpan && lc.link) {
          labelSpan.innerHTML = `<a href="${lc.link}" target="_blank" style="color:inherit;text-decoration:underline;text-underline-offset:2px;">${escHtml(lc.name)}</a>`;
        }
        return row;
      });
      main.appendChild(card(lcItems));
    });
    return;
  }

  // PHASE 2: System Design
  if (p.id === 2) {
    main.appendChild(phaseHeader(p));
    main.appendChild(warn(p.warning));
    main.appendChild(approach(p.approach, color));

    p.concepts.forEach((sec, si) => {
      main.appendChild(sectionHead(sec.section));
      const items = sec.items.map((item, ii) =>
        checkRow(`p2_sd_${si}_${ii}`, item.label, item.note, color)
      );
      main.appendChild(card(items));
    });
    return;
  }

  // PHASE 3: Projects
  if (p.id === 3) {
    main.appendChild(phaseHeader(p));
    main.appendChild(warn(p.warning));

    p.projects.forEach((proj, pj) => {
      const projCard = document.createElement('div');
      projCard.className = 'card';
      projCard.style.borderTop = `3px solid ${color}`;
      projCard.style.marginBottom = '16px';

      const projHead = document.createElement('div');
      projHead.style.cssText = 'padding:16px;border-bottom:1px solid #1A2030;';
      projHead.innerHTML = `
        <span class="tag" style="background:${color}18;color:${color};border:1px solid ${color}30">${escHtml(proj.type)}</span>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em;color:#fff;margin:8px 0 4px">${escHtml(proj.name)}</div>
        <div style="font-size:12px;color:#8090A0;line-height:1.6">${escHtml(proj.why)}</div>`;
      projCard.appendChild(projHead);

      main.appendChild(sectionHead('What to Build'));
      proj.what.forEach((item, wi) => {
        projCard.appendChild(checkRow(`p3_proj_${pj}_${wi}`, item, null, color));
      });

      const meta = document.createElement('div');
      meta.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;background:#070A0D;border-top:1px solid #1A2030;';
      meta.innerHTML = `
        <div><div style="font-size:10px;color:#405060;letter-spacing:.12em;font-weight:700;margin-bottom:4px">STACK</div><div style="font-size:11px;color:#607080">${escHtml(proj.stack)}</div></div>
        <div><div style="font-size:10px;color:#405060;letter-spacing:.12em;font-weight:700;margin-bottom:4px">DEPLOY</div><div style="font-size:11px;color:#607080">${escHtml(proj.deploy)}</div></div>`;
      projCard.appendChild(meta);

      const talkHead = document.createElement('div');
      talkHead.style.cssText = 'padding:10px 16px 4px;font-size:10px;color:#405060;letter-spacing:.12em;font-weight:700';
      talkHead.textContent = 'INTERVIEW TALKING POINTS';
      projCard.appendChild(talkHead);
      proj.talkingPoints.forEach(tp => {
        const tpEl = document.createElement('div');
        tpEl.style.cssText = 'padding:7px 16px;font-size:12px;color:#607080;border-bottom:1px solid #0E1318;line-height:1.6';
        tpEl.textContent = '→ ' + tp;
        projCard.appendChild(tpEl);
      });

      main.appendChild(projCard);
    });
    return;
  }

  // PHASE 4: Interview Execution
  if (p.id === 4) {
    main.appendChild(phaseHeader(p));
    main.appendChild(warn(p.warning));

    main.appendChild(sectionHead('Coding Interview Rules'));
    const rules = p.codingRules.map((r, ri) =>
      checkRow(`p4_rule_${ri}`, r.label, r.note, color)
    );
    main.appendChild(card(rules));

    main.appendChild(sectionHead('Behavioral — These Exact Questions'));
    p.behavioral.forEach((b, bi) => {
      const bCard = document.createElement('div');
      bCard.className = 'card';
      bCard.style.marginBottom = '10px';
      const row = checkRow(`p4_behav_${bi}`, '"' + b.q + '"', b.note, color);
      bCard.appendChild(row);
      main.appendChild(bCard);
    });
    return;
  }

  // PHASE 5: Schedule
  if (p.id === 5) {
    main.appendChild(phaseHeader(p));

    const grid = document.createElement('div');
    grid.className = 'sched-grid';
    p.schedule.forEach(day => {
      const card = document.createElement('div');
      card.className = 'sched-card';
      card.innerHTML = `<div class="sched-day">${day.day}</div>` +
        day.slots.map(s => `<div class="sched-slot">${escHtml(s)}</div>`).join('');
      grid.appendChild(card);
    });
    main.appendChild(grid);

    main.appendChild(sectionHead('The Hard Truths'));
    const truthList = document.createElement('div');
    p.truths.forEach((t, ti) => {
      const row = document.createElement('div');
      row.className = 'truth-row';
      row.innerHTML = `<div class="truth-num">${String(ti+1).padStart(2,'0')}</div><div class="truth-text">${escHtml(t)}</div>`;
      truthList.appendChild(row);
    });
    main.appendChild(truthList);
    return;
  }
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
function renderApp() {
  const nameEl = document.getElementById('user-name-val');
  if (nameEl) nameEl.textContent = state.username || '—';
  renderSidebar();
  renderMain();
  updateProgress();
}

initUser();

</script>
